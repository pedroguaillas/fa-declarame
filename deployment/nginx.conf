# /etc/nginx/sites-available/fa-declarame
#
# Multi-tenant SaaS — dominio central + subdominios de tenants
# Reemplaza declarame.facec.ec con tu dominio real (ej. declarame.ec)

# ── Dominio central ─────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name declarame.facec.ec;

    root /var/www/fa-declarame/public;
    index index.php;

    # Redirige todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name declarame.facec.ec;

    root /var/www/fa-declarame/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/declarame.facec.ec/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/declarame.facec.ec/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 64M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# ── Subdominios de tenants (wildcard) ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name *.declarame.facec.ec;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name *.declarame.facec.ec;

    root /var/www/fa-declarame/public;
    index index.php;

    # Certificado wildcard (requiere DNS challenge con certbot)
    ssl_certificate     /etc/letsencrypt/live/declarame.facec.ec/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/declarame.facec.ec/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 64M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
